---
# ============================================================
# O banco de dados é gerenciado pelo RDS (LocalStack).
# Este role roda na EC2 da API para executar o schema e as seeds
# conectando-se ao endpoint RDS via psql.
# ============================================================

# ============================================================
# Instalar cliente PostgreSQL na EC2 da API
# ============================================================
- name: Instalar cliente PostgreSQL (psql)
  apt:
    name: postgresql-client
    state: present
    update_cache: true

# ============================================================
# Criar schema (DDL)
# ============================================================
- name: Copiar schema SQL para a EC2
  copy:
    src: schema.sql
    dest: /tmp/schema.sql
    mode: '0644'

- name: Executar schema no RDS
  shell: |
    psql "postgresql://{{ db_user }}:{{ db_password }}@{{ rds_host }}:{{ rds_port }}/{{ db_name }}" \
      -f /tmp/schema.sql
  no_log: true
  args:
    executable: /bin/bash

# ============================================================
# Inserir seeds
# ============================================================
- name: Copiar seeds SQL para a EC2
  copy:
    src: seeds.sql
    dest: /tmp/seeds.sql
    mode: '0644'

- name: Executar seeds no RDS
  shell: |
    psql "postgresql://{{ db_user }}:{{ db_password }}@{{ rds_host }}:{{ rds_port }}/{{ db_name }}" \
      -f /tmp/seeds.sql
  no_log: true
  args:
    executable: /bin/bash

