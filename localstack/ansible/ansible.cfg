[defaults]
host_key_checking   = False
private_key_file    = keys/localstack
remote_user         = ubuntu
roles_path          = roles
stdout_callback     = yaml
retry_files_enabled = False
timeout             = 30

[ssh_connection]
ssh_args   = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=30
pipelining = True
