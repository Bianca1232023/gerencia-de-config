version: '3.8'

services:
  localstack:
    image: localstack/localstack:3.0
    container_name: localstack
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"   # portas internas das instâncias RDS
    environment:
      SERVICES: ec2,rds,apigateway,iam,logs,sts
      DEFAULT_REGION: us-east-1
      DEBUG: "1"
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack_data:/var/lib/localstack
    networks:
      - dating-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # Simula a EC2 da API (container Ubuntu com SSH)
  ec2-api:
    build:
      context: ./docker
      dockerfile: Dockerfile.ec2
    container_name: ec2-api
    hostname: ec2-api
    ports:
      - "2222:22"    # SSH para Ansible
      - "3000:3000"  # API Node.js
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - dating-net
    depends_on:
      localstack:
        condition: service_healthy

networks:
  dating-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  localstack_data:
